<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 伴手礼管家</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🎁</span>
    <span class="brand-text">伴手礼管家</span>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <a class="nav-item active" data-page="dashboard">
      <span class="nav-icon">📊</span> 工作台
    </a>
    <a class="nav-item" data-page="products">
      <span class="nav-icon">📦</span> 商品库
    </a>
    <a class="nav-item" data-page="sourcing">
      <span class="nav-icon">🏪</span> 比价采购
    </a>
    <a class="nav-item" data-page="bundles">
      <span class="nav-icon">🧺</span> 方案搭建
    </a>
    <a class="nav-item" data-page="analytics">
      <span class="nav-icon">📈</span> 数据看板
    </a>
    <a class="nav-item" data-page="stock">
      <span class="nav-icon">📋</span> 进出记录
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="version">v2.0</span>
    <span class="sidebar-divider">·</span>
    <a class="nav-item small" data-page="competitors">🔍 竞品</a>
  </div>
</aside>

<!-- 遮罩 -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- 主内容 -->
<main class="main-content" id="main-content">
  <header class="topbar">
    <button class="menu-toggle" id="menu-toggle" aria-label="菜单">☰</button>
    <h1 class="page-title" id="page-title">📊 工作台</h1>
    <div class="topbar-actions">
      <button class="btn btn-gradient btn-sm" id="btn-quick-add">＋ 快速添加</button>
    </div>
  </header>
  <div class="page-container" id="page-container"></div>
</main>

<!-- 底部Tab（移动端） -->
<nav class="mobile-tabs" id="mobile-tabs">
  <button class="tab-item active" data-page="dashboard"><span class="tab-icon">📊</span><span class="tab-label">工作台</span></button>
  <button class="tab-item" data-page="products"><span class="tab-icon">📦</span><span class="tab-label">商品库</span></button>
  <button class="tab-item" data-page="sourcing"><span class="tab-icon">🏪</span><span class="tab-label">比价</span></button>
  <button class="tab-item" data-page="bundles"><span class="tab-icon">🧺</span><span class="tab-label">方案</span></button>
  <button class="tab-item" data-page="stock"><span class="tab-icon">📋</span><span class="tab-label">记录</span></button>
</nav>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/products.js"></script>
<script src="/js/pages/sourcing.js"></script>
<script src="/js/pages/bundles.js"></script>
<script src="/js/pages/analytics.js"></script>
<script src="/js/pages/stock.js"></script>
<script src="/js/pages/competitors.js"></script>

</body>
</html>
